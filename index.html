<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Block Coding Platform</title>
    <script src="https://unpkg.com/blockly/blockly.map.js"></script>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; }
        #blocklyDiv { height: 90vh; width: 100vw; }
        #toolbox { display: none; }
    </style>
</head>
<body>

    <h2 style="margin: 10px;">My Custom Block Platform</h2>
    <div id="blocklyDiv"></div>

    <xml id="toolbox" style="display: none">
        <category name="Logic" colour="%{BKY_LOGIC_HUE}">
            <block type="controls_if"></block>
            <block type="logic_compare"></block>
        </category>
        <category name="Loops" colour="%{BKY_LOOPS_HUE}">
            <block type="controls_repeat_ext"></block>
        </category>
        <category name="Math" colour="%{BKY_MATH_HUE}">
            <block type="math_number"></block>
            <block type="math_arithmetic"></block>
        </category>
    </xml>

    <script>
        // Inject Blockly into the div
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            scrollbars: true,
            trashcan: true
        });
    </script>
</body>
</html>
