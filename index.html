<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom Block Coding Platform</title>
  <link rel="stylesheet" href="style.css">
  <!-- Inject Blockly core and standard blocks -->
  <script src="https://unpkg.com"></script>
  <script src="https://unpkg.com"></script>
  <script src="https://unpkg.com"></script>
</head>
<body>

  <div id="ui-wrapper">
    <!-- The block selector sidebar and canvas grid -->
    <div id="blocklyDiv"></div>
    
    <!-- Real-time code preview and output execution -->
    <div id="outputPanel">
      <button id="runBtn">▶ Run Code</button>
      <pre id="codePreview">// Generated JavaScript will appear here</pre>
    </div>
  </div>

  <!-- Define your toolbox (the sidebar choices) -->
  <xml id="toolbox" style="display: none">
    <category name="Logic" colour="%{BKY_LOGIC_HUE}">
      <block type="controls_if"></block>
      <block type="logic_compare"></block>
    </category>
    <category name="Loops" colour="%{BKY_LOOPS_HUE}">
      <block type="controls_repeat_ext"></block>
    </category>
    <category name="Math" colour="%{BKY_MATH_HUE}">
      <block type="math_number"></block>
      <block type="math_arithmetic"></block>
    </category>
    <category name="Text" colour="%{BKY_TEXT_HUE}">
      <block type="text"></block>
      <block type="text_print"></block>
    </category>
  </xml>

  <script src="app.js"></script>
</body>
</html>
