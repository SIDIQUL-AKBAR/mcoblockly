<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Block Coding Platform</title>
  <!-- Load Blockly Core and Blocks via UNPKG CDN -->
  <script src="https://unpkg.com"></script>
  <style>
    body { font-family: sans-serif; margin: 10px; }
    #blocklyDiv { height: 480px; width: 600px; border: 1px solid #ccc; }
    #codeArea { margin-top: 10px; width: 600px; height: 150px; }
  </style>
</head>
<body>
  <h1>Interactive Block Coding</h1>
  
  <!-- Visual canvas for dragging blocks -->
  <div id="blocklyDiv"></div>

  <!-- Area to output the compiled JavaScript code -->
  <textarea id="codeArea" readonly placeholder="Your generated code will appear here..."></textarea>

  <!-- Define standard toolbox choices -->
  <xml id="toolbox" style="display: none">
    <category name="Logic" colour="%{BKY_LOGIC_HUE}">
      <block type="controls_if"></block>
      <block type="logic_compare"></block>
    </category>
    <category name="Loops" colour="%{BKY_LOOPS_HUE}">
      <block type="controls_repeat_ext"></block>
    </category>
    <category name="Math" colour="%{BKY_MATH_HUE}">
      <block type="math_number"></block>
      <block type="math_arithmetic"></block>
    </category>
    <category name="Variables" custom="VARIABLE" colour="%{BKY_VARIABLES_HUE}"></category>
  </xml>

  <script>
    // Inject the visual Blockly workspace into the div
    const workspace = Blockly.inject('blocklyDiv', {
      toolbox: document.getElementById('toolbox')
    });

    // Real-time compilation listener
    function updateCode() {
      const code = Blockly.JavaScript.workspaceToCode(workspace);
      document.getElementById('codeArea').value = code;
    }
    workspace.addChangeListener(updateCode);
  </script>
</body>
</html>
